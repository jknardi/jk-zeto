# EN: Workflow name displayed on GitHub Actions tab
# ID: Nama Alur Kerja yang ditampilkan di tab GitHub Actions
name: jk-zeto Automated Testing

# EN: Define triggers for the workflow
# ID: Tentukan pemicu untuk alur kerja ini
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# EN: List of jobs to execute
# ID: Daftar pekerjaan yang akan dieksekusi
jobs:
  test:
    # EN: Run on the latest Ubuntu environment
    # ID: Dijalankan di lingkungan Ubuntu terbaru
    runs-on: ubuntu-latest

    # EN: Test matrix using multiple Node.js versions to ensure compatibility
    # ID: Matriks pengujian menggunakan beberapa versi Node.js untuk memastikan kompatibilitas
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
    # EN: Step 1 - Checkout the code from repository
    # ID: Langkah 1 - Ambil kode program dari repositori
    - name: Checkout Repository / Ambil Kode Repositori
      uses: actions/checkout@v4

    # EN: Step 2 - Set up the specific Node.js version
    # ID: Langkah 2 - Siapkan versi Node.js yang ditentukan
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    # EN: Step 3 - Install dependencies (Express/Fastify for examples)
    # ID: Langkah 3 - Instal dependensi (Express/Fastify untuk contoh)
    - name: Install Dependencies / Instal Dependensi
      run: npm install

    # EN: Step 4 - Execute the native test runner
    # ID: Langkah 4 - Eksekusi test runner bawaan Node.js
    - name: Run Test Engine / Jalankan Mesin Pengujian
      run: npm test
